appId: com.timemapper.app
name: Tap entry row → EntryEditSheet → save
tags:
  - entry
  - edit
---
# Verifies the Timeline entry row tap opens the EntryEditSheet, the
# pickers hydrate from the entry's stored times, and saving closes the
# sheet without error.
#
# Prereqs: none — clearState resets everything. The flow seeds a place
# via onboarding, then creates a manual entry via the Timeline FAB before
# testing the edit flow.

- launchApp:
    clearState: true

- runFlow:
    file: "./flows/seed-one-place.yaml"

# Create a manual entry using the Timeline FAB (visible once places.length > 0)
- tapOn:
    id: "timeline-fab"

# EntryEditSheet opens in "New entry" mode
- extendedWaitUntil:
    visible: "New entry"
    timeout: 5000

# Pickers are mounted; check net-duration readout
- assertVisible:
    id: "entry-edit-net"

# Save without changing anything — creates the entry with default times
- tapOn:
    id: "entry-edit-save"

- extendedWaitUntil:
    visible: "Timeline"
    timeout: 5000

# The entry row should now be present on the Timeline (tap by place name)
- tapOn: "Home"

# Sheet title comes up in edit mode
- extendedWaitUntil:
    visible: "Edit entry"
    timeout: 5000

# Pickers should be mounted — check the net minutes readout
- assertVisible:
    id: "entry-edit-net"

# Save, return to Timeline, assert no crash
- tapOn:
    id: "entry-edit-save"

- assertNotVisible: "Edit entry"
