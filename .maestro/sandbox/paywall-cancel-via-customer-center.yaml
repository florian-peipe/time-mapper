appId: com.timemapper.app
name: "[Sandbox] Cancel subscription via RC Customer Center"
tags:
  - sandbox
  - paywall
---
# Pre-state: active monthly subscription (seeded via seed-pro-monthly).
# Tapping the Pro active row opens the RC Customer Center native overlay.
#
# Customer Center screen title: "How can we help?"
# Cancel button text: "Cancel subscription" (confirmed in RC dashboard)
# After tapping cancel, a Feedback Survey appears with options:
#   "Too expensive" / "Don't use the app" / "Bought by mistake"
# RC may then show a promotional offer before final confirmation.
#
# NOTE: The Customer Center is a native RC overlay. All assertions are
# text-based against the native UI, not testIDs.

- launchApp:
    clearState: true

- runFlow:
    file: "../../flows/seed-one-place.yaml"

- runFlow:
    file: "./flows/seed-pro-monthly.yaml"

- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      id: "settings-row-pro-active"
    timeout: 10000

# Tap Pro active row → opens RC Customer Center
- tapOn:
    id: "settings-row-pro-active"

# Customer Center screen title is "How can we help?"
- extendedWaitUntil:
    visible: "How can we help?"
    timeout: 10000

# Tap "Cancel subscription" button
- tapOn: "Cancel subscription"

# Feedback Survey — pick a reason
- extendedWaitUntil:
    visible: "Too expensive"
    timeout: 8000
- tapOn: "Too expensive"

# RC may show a promotional offer — skip it if present
- runFlow:
    when:
      visible: "No thanks"
    commands:
      - tapOn: "No thanks"

# Final confirmation dialog or proceed button
- runFlow:
    when:
      visible: "Continue cancellation"
    commands:
      - tapOn: "Continue cancellation"
- runFlow:
    when:
      visible: "Confirm cancellation"
    commands:
      - tapOn: "Confirm cancellation"

- waitForAnimationToEnd:
    timeout: 3000

# Dismiss the Customer Center
- back

# Settings screen is back — sub may still be active until period end
# (Pro row stays visible), or resubscribe row appears. Either is valid.
- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000
