appId: com.timemapper.app
name: Onboarding → first place → Timeline smoke
tags:
  - smoke
---
# End-to-end smoke test. Validates that a cold-booted user can walk the
# v1.1 5-slide onboarding (Welcome → How it works → Goals and Stats →
# Privacy → Permissions → First place) and land on the Timeline. Proves
# build linking works, navigation flows, and the DB migrations apply
# before the first user action.
#
# Prereqs: freshly installed app with no prior data. `clearState` below
# makes re-runs safe.

- launchApp:
    clearState: true

# Let the OS settle so any system dialogs (e.g. Location Accuracy) have time to appear
- waitForAnimationToEnd:
    timeout: 5000

# Confirm Location Accuracy if Google Play Services shows the prompt
- runFlow:
    when:
      visible: "Location Accuracy"
    commands:
      - tapOn: "Turn on"

# Welcome — extended wait covers Metro bundle download on first cold launch
- extendedWaitUntil:
    visible: "Time Mapper"
    timeout: 60000

# Tap the LogBox X button position twice with a delay — dismisses the toast if present,
# harmless tap on empty space otherwise. X bounds: ~[970,2207][1022,2259] on 1080x2400.
- tapOn:
    point: "92%,93%"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "92%,93%"
- waitForAnimationToEnd:
    timeout: 1000

- tapOn: "Get started"

# How it works
- extendedWaitUntil:
    visible: "How it works"
    timeout: 10000
- tapOn: "Continue"

# Goals and stats
- extendedWaitUntil:
    visible: "Goals and stats"
    timeout: 10000
- tapOn: "Continue"

# Privacy
- extendedWaitUntil:
    visible: "Private by default"
    timeout: 10000
- tapOn: "Continue"

# Permissions — stub: skip without granting, the app should let us through
# so we can see the First place screen.
- extendedWaitUntil:
    visible: "Always location"
    timeout: 10000
- tapOn: "Not now"

# First place
- extendedWaitUntil:
    visible: "Your first place"
    timeout: 10000
- tapOn: "Skip for now"

# Landed on the Timeline tab.
- extendedWaitUntil:
    visible: "Timeline"
    timeout: 10000
