appId: com.timemapper.app
name: Settings → Restore purchases row
tags:
  - settings
  - paywall
---
# Verifies the "Restore purchases" row in Settings is tappable and that
# tapping it triggers the restore flow (confirmed by the row's detail
# label updating away from its idle state).

- launchApp:
    clearState: true

- runFlow:
    file: "./flows/seed-one-place.yaml"

- tapOn: "Settings"

- extendedWaitUntil:
    visible:
      id: "settings-row-restore"
    timeout: 5000

- tapOn:
    id: "settings-row-restore"

# The row detail briefly shows "Restoring…" as the RC call fires.
# We accept either busy or done/error state — the important thing is the
# Settings screen stays stable and doesn't crash.
- waitForAnimationToEnd:
    timeout: 3000

# Settings screen still intact
- assertVisible:
    id: "settings-row-restore"
