appId: com.timemapper.app
name: Second place triggers paywall
tags:
  - paywall
  - pro-gate
---
# Verifies the free-tier gate: starting from a fresh install, adds a first
# place through onboarding, then tries to add a second place from the Places
# tab. The save attempt on Phase 2 should open the PaywallSheet.
#
# Prereqs: none — clearState resets everything.

- launchApp:
    clearState: true

- runFlow:
    file: "./flows/seed-one-place.yaml"

# Navigate to the Places tab — 1 place is visible
- tapOn: "Places"

# The FAB is visible because places.length > 0
- extendedWaitUntil:
    visible:
      id: "places-fab-add"
    timeout: 5000
- tapOn:
    id: "places-fab-add"

# AddPlace sheet opens — search for a second address
- extendedWaitUntil:
    visible:
      id: "add-place-search"
    timeout: 5000
- tapOn:
    id: "add-place-search"
- inputText: "Munich"

- extendedWaitUntil:
    visible:
      id: "add-place-suggestion-0"
    timeout: 10000
- tapOn:
    id: "add-place-suggestion-0"

# Phase 2 — save button label changes to "Unlock more places with Pro"
# when shouldPaywall is true
- extendedWaitUntil:
    visible:
      id: "add-place-save"
    timeout: 5000
- tapOn:
    id: "add-place-save"

# The paywall should present
- extendedWaitUntil:
    visible: "Time Mapper Pro"
    timeout: 10000

# Dismiss the paywall (user-cancelled flow)
- back
