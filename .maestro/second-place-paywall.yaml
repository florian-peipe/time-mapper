appId: com.timemapper.app
name: Second place triggers paywall
tags:
  - paywall
  - pro-gate
---
# Verifies the free-tier gate: after saving the first place during
# onboarding, attempting to add a second place from the Places tab
# opens the RevenueCat-hosted paywall (source: "2nd-place").
#
# Prereqs:
#   - App already has ONE place (run onboarding-smoke.yaml first, or seed).
#   - Not on Pro. If the test account is Pro, cancel sandbox sub first.

- launchApp

# Navigate to Places tab
- tapOn: "Places"

# Tap the add-place FAB
- tapOn:
    id: "places-fab"

# The paywall should present. Either the RC-hosted paywall (real mode)
# or — if RC isn't yet configured — the AddPlaceSheet opens and we see
# it stash `pendingPlaceForm`. Assert on either outcome.
- runFlow:
    when:
      visible: "Time Mapper Pro"
    commands:
      - assertVisible: "Time Mapper Pro"

# Dismiss the paywall (user-cancelled flow).
- back
