appId: com.timemapper.app
name: Settings → Language cycle (System → English → Deutsch)
tags:
  - i18n
  - settings
---
# Verifies the Language row cycles the in-app locale and the Settings
# header re-renders in the new locale on each tap. Exercises the
# `uiStore.setLocaleOverride` + `setLocale()` side-effect.

- launchApp:
    clearState: true

- runFlow:
    file: "./flows/seed-one-place.yaml"

- tapOn: "Settings"

# Initial state — should read "System" (unless a prior run left an override).
- assertVisible:
    id: "settings-row-language"

- tapOn:
    id: "settings-row-language"

# After first tap we're on English; assert on a string that only appears
# in the Settings body (not the tab bar): the "Appearance" section heading.
- assertVisible: "Appearance"

- tapOn:
    id: "settings-row-language"

# Second tap → Deutsch. The section heading flips to "Darstellung".
- assertVisible: "Darstellung"

# Reset to System (English on this emulator).
- tapOn:
    id: "settings-row-language"

- assertVisible: "Appearance"
