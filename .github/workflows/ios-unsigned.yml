name: iOS unsigned build

# Builds an unsigned .ipa on a macOS runner and uploads it as a workflow
# artifact. The artifact can then be downloaded on Windows and resigned via
# Sideloadly (with a free Apple ID — 7-day install, no paid dev account).
#
# This workflow intentionally leaves all env keys empty so the resulting
# build runs in its "no keys" posture:
#   - Subscription:  mock — Settings → Developer → "Toggle Pro (mock)"
#                    flips Pro state on/off locally.
#   - Autocomplete:  Photon (no key needed). Falls back to 3 hardcoded
#                    Köln demo addresses if Photon is unreachable.
#   - Map preview:   iOS = Apple Maps (free, native). Android = needs
#                    the free Google Maps for Android SDK key in app.json;
#                    without it the Android map shows a warning Banner
#                    (iOS-only sideload isn't affected).
#   - Sentry:        disabled (captureException → console.error).
#
# Cost note: macOS runner minutes count 10× against the free tier. A full
# build here takes ~20-30 min, so budget ~200-300 effective minutes per
# build against the 2000 free minutes/month.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Xcode configuration (Release recommended — Debug expects Metro running locally)
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

  push:
    branches: [main]
    paths:
      - "src/**"
      - "app/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-unsigned.yml"

concurrency:
  group: ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned .ipa
    runs-on: macos-15
    timeout-minutes: 60

    env:
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      # Expo prebuild adds Sentry's "Bundle React Native code and images"
      # and "Upload Debug Symbols to Sentry" script phases to the Xcode
      # project. Without a SENTRY_ORG/PROJECT/AUTH_TOKEN those phases fail
      # the archive. Since this workflow intentionally ships with Sentry
      # disabled (see header), tell the Sentry scripts to skip uploading —
      # they short-circuit to a no-op and let the underlying RN bundle
      # script run unwrapped.
      SENTRY_DISABLE_AUTO_UPLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # React Native 0.81 (shipped by Expo SDK 54) requires Xcode 16.1+.
      # Use `latest-stable` rather than pinning 16.1: on the macos-15 image,
      # Xcode 16.1 ships with the iOS 18.1 **SDK** but not the iOS 18.1
      # **Platform** (the ibtool/actool device-support bundle Xcode 16
      # started shipping as a separate download). That made ibtool fail
      # with "iOS 18.1 Platform Not Installed" on SplashScreen.storyboard,
      # and `xcodebuild -downloadPlatform iOS` can't run on a hosted runner
      # (exit 70, "Unable to connect to simulator"). The image's default
      # Xcode has its matching Platform preinstalled, so picking it avoids
      # the whole download path.
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      # Diagnostic dump so any future "Platform Not Installed" regression
      # shows up in the log without needing another CI round-trip.
      - name: Show Xcode + iOS Platform state
        run: |
          set -euo pipefail
          echo "=== xcode-select ==="
          xcode-select -p
          xcodebuild -version
          echo "=== Installed Xcodes ==="
          ls -1d /Applications/Xcode*.app 2>/dev/null || true
          XCODE_DEV="$(xcode-select -p)"
          echo "=== Platforms under active Xcode ==="
          ls -la "$XCODE_DEV/Platforms/" 2>&1 || true
          echo "=== iPhoneOS.platform/Developer ==="
          ls -la "$XCODE_DEV/Platforms/iPhoneOS.platform/Developer" 2>&1 || true
          echo "=== xcodebuild -showsdks ==="
          xcodebuild -showsdks

      - name: Install JS deps
        run: npm ci

      - name: Expo prebuild (ios)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install Pods
        working-directory: ios
        run: |
          # Podfile.lock pins every spec deterministically and the macOS runner
          # image ships the CocoaPods master repo. Try the fast path first; fall
          # back to --repo-update only if a new spec needs fetching.
          if ! pod install; then
            echo "pod install failed; retrying with --repo-update"
            pod install --repo-update
          fi

      # Resolve the scheme + workspace names AFTER `pod install` runs — the
      # .xcworkspace is created by CocoaPods, not by `expo prebuild`. Using
      # `find` rather than a glob keeps this portable across BSD and GNU ls.
      - name: Resolve scheme + workspace
        id: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -n1)
          if [ -z "$WORKSPACE" ]; then
            echo "::error::No .xcworkspace found under ios/"
            ls -la ios/
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Resolved: workspace=$WORKSPACE scheme=$SCHEME"

      # Archive (not build) because:
      #   1. Archive infers the destination from -sdk, so we don't need a
      #      `-destination generic/platform=iOS` flag — and that flag is
      #      exactly what tripped up the first attempt (Xcode rejected
      #      the destination even though the iOS 18.1 SDK is present).
      #   2. Archive drops the .app at a predictable path inside the
      #      .xcarchive bundle, ready to zip into a Payload/.
      - name: Archive unsigned .app
        env:
          SCHEME: ${{ steps.ios.outputs.scheme }}
          WORKSPACE: ${{ steps.ios.outputs.workspace }}
        run: |
          set -euo pipefail
          mkdir -p build
          # Tee the raw log so xcpretty can pretty-print the summary in the
          # Actions UI while the full output (including any ibtool/actool
          # crashes that xcpretty drops) is preserved for the artifact.
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            -resultBundlePath build/xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build/xcodebuild.log | xcpretty

      - name: Show xcodebuild log tail on failure
        if: failure()
        run: |
          echo "::group::xcodebuild.log — last 400 lines"
          tail -n 400 build/xcodebuild.log || true
          echo "::endgroup::"

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-diagnostics
          path: |
            build/xcodebuild.log
            build/xcresult
          if-no-files-found: ignore
          retention-days: 14

      - name: Package .app into .ipa
        env:
          SCHEME: ${{ steps.ios.outputs.scheme }}
        run: |
          set -euo pipefail
          APP_PATH="build/App.xcarchive/Products/Applications/${SCHEME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected .app not found at $APP_PATH"
            find build -maxdepth 5 -type d 2>/dev/null | head -40 || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          IPA_NAME="${SCHEME}-${CONFIGURATION}-unsigned.ipa"
          zip -qr "$IPA_NAME" Payload
          rm -rf Payload
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "Produced: $IPA_NAME ($(du -h "$IPA_NAME" | cut -f1))"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 14
