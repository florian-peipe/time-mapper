name: iOS unsigned build

# Builds an unsigned .ipa on a macOS runner and uploads it as a workflow
# artifact. The artifact can then be downloaded on Windows and resigned via
# Sideloadly (with a free Apple ID — 7-day install, no paid dev account).
#
# This workflow intentionally leaves all env keys empty so the resulting
# build runs in its "no keys" posture:
#   - Subscription:  mock — Settings → Developer → "Toggle Pro (mock)"
#                    flips Pro state on/off locally.
#   - Autocomplete:  Photon (no key needed). Falls back to 3 hardcoded
#                    Köln demo addresses if Photon is unreachable.
#   - Map preview:   iOS = Apple Maps (free, native). Android = needs
#                    the free Google Maps for Android SDK key in app.json;
#                    without it the Android map shows a warning Banner
#                    (iOS-only sideload isn't affected).
#   - Sentry:        disabled (captureException → console.error).
#
# Cost note: macOS runner minutes count 10× against the free tier. A full
# build here takes ~20-30 min, so budget ~200-300 effective minutes per
# build against the 2000 free minutes/month.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Xcode configuration (Release recommended — Debug expects Metro running locally)
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

  push:
    branches: [main]
    paths:
      - "src/**"
      - "app/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-unsigned.yml"

concurrency:
  group: ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned .ipa
    runs-on: macos-15
    timeout-minutes: 60

    env:
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # React Native 0.81 (shipped by Expo SDK 54) requires Xcode 16.1+.
      # The macos-15 runner image includes 16.x by default.
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Install JS deps
        run: npm ci

      - name: Expo prebuild (ios)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install Pods
        working-directory: ios
        run: pod install --repo-update

      # Resolve the scheme + workspace names AFTER `pod install` runs — the
      # .xcworkspace is created by CocoaPods, not by `expo prebuild`. Using
      # `find` rather than a glob keeps this portable across BSD and GNU ls.
      - name: Resolve scheme + workspace
        id: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -n1)
          if [ -z "$WORKSPACE" ]; then
            echo "::error::No .xcworkspace found under ios/"
            ls -la ios/
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Resolved: workspace=$WORKSPACE scheme=$SCHEME"

      - name: Build unsigned .app
        env:
          SCHEME: ${{ steps.ios.outputs.scheme }}
          WORKSPACE: ${{ steps.ios.outputs.workspace }}
        run: |
          set -euo pipefail
          # GitHub Actions runs bash with pipefail on, so any non-zero exit
          # from xcodebuild fails the step through the xcpretty pipe.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty

      - name: Package .app into .ipa
        env:
          SCHEME: ${{ steps.ios.outputs.scheme }}
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/${CONFIGURATION}-iphoneos/${SCHEME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected .app not found at $APP_PATH"
            ls -la "build/Build/Products/" || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          IPA_NAME="${SCHEME}-${CONFIGURATION}-unsigned.ipa"
          zip -qr "$IPA_NAME" Payload
          rm -rf Payload
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "Produced: $IPA_NAME ($(du -h "$IPA_NAME" | cut -f1))"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 14
