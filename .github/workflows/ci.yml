name: CI

# Required status check — runs on every push + PR targeting main.
# Gates lint, typecheck, tests, and an Expo export (bundler sanity).
# The ios-unsigned workflow is manual-dispatch only; this one is the
# automatic quality gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint + typecheck + test + bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Lint (zero-warning baseline)
        run: npm run lint -- --max-warnings 0

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test -- --ci --reporters=default

      - name: Expo bundle sanity
        run: npm run build:check
        env:
          # Bundling only — no keys needed. Mock-mode fallbacks cover gaps.
          EXPO_PUBLIC_REVENUECAT_IOS_KEY: ""
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: ""
          EXPO_PUBLIC_SENTRY_DSN: ""
